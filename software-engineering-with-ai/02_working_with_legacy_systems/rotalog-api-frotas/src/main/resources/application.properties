# RotaLog - API Frotas Configuration
# Legacy configuration with intentional debt

# Server
server.port=8080
server.servlet.context-path=/api

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/rotalog?currentSchema=frotas
spring.datasource.username=rotalog_admin
spring.datasource.password=rotalog123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=frotas

# Flyway
# Flyway - DESABILITADO: schema e seed gerenciados pelo docker-compose
# FIXME: deveria usar Flyway corretamente em vez de init scripts no docker
spring.flyway.enabled=false
#spring.flyway.locations=classpath:db/migration
#spring.flyway.schemas=frotas
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=2

# Logging
logging.level.root=INFO
logging.level.com.rotalog=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Manutencao preventiva
veiculo.manutencao.limite-quilometragem=50000
veiculo.manutencao.custo-por-km=0.05
veiculo.manutencao.custo-base=500.0
veiculo.manutencao.limite-meses=6
veiculo.manutencao.alerta.cron=0 0 6 * * *

